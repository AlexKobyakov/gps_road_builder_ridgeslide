name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint & offline tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 3.9 matches QGIS 3.22 (target min version); 3.12 guards forward compat.
        # Cross-platform: the plugin must work on Windows and Linux.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-test.txt

      - name: Lint (hard gate — syntax errors and undefined names)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint (full — informational)
        continue-on-error: true
        run: flake8 . --count --statistics

      - name: Run offline unit tests
        run: pytest -v
